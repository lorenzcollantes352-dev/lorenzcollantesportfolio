<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Lorenz Collantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #00f2fe;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --bg-image: url('PHOTO.jpg'); 
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            color: var(--text-main); 
            background: 
                radial-gradient(circle at top left, rgba(30, 30, 47, 0.9), rgba(15, 12, 41, 0.92), rgba(0, 0, 0, 0.95)),
                var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            animation: pageIn 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            padding: 80px 10%;
            min-height: 100vh;
        }

        .header { margin-bottom: 60px; text-align: left; }
        
        .back-link { 
            text-decoration: none; 
            color: var(--text-dim); 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            transition: 0.3s;
            display: inline-block;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        h1 { 
            font-size: clamp(2.5rem, 6vw, 3.5rem); 
            margin-top: 15px; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff, var(--text-dim));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .work-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 25px; 
        }

        /* Wrap project boxes in links */
        .project-link { text-decoration: none; color: inherit; display: block; }

        .project-box { 
            position: relative; 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            cursor: pointer;
            border-radius: 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .project-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: grayscale(100%);
            transition: 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        .project-link:hover .project-box {
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.15);
        }

        .project-link:hover img { 
            transform: scale(1.08); 
            filter: grayscale(0%) brightness(0.3); 
        }

        .overlay { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            transition: 0.4s; 
            padding: 20px;
            text-align: center;
        }

        .project-link:hover .overlay { opacity: 1; }

        .overlay h3 { font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 5px; color: #fff; }
        .overlay p { color: var(--accent); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 300; }

        @media (max-width: 480px) {
            body { padding: 60px 20px; }
            .work-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link">← BACK TO ARCHIVE</a>
        <h1>Collection.</h1>
    </div>

    <div class="work-grid">
        <a href="Social Media Copies.html" class="project-link">
            <div class="project-box">
                <img src="proj1.jpg" alt="Social Media">
                <div class="overlay">
                    <h3>Social Media Copies</h3>
                    <p>Brand Strategy</p>
                </div>
            </div>
        </a>
        
        <a href="Digital Artworks.html" class="project-link">
            <div class="project-box">
                <img src="proj2.jpg" alt="Digital Art">
                <div class="overlay">
                    <h3>Digital Artworks</h3>
                    <p>Hand Drawn Artworks</p>
                </div>
            </div>
        </a>

        <a href="BRAND MARKETING.html" class="project-link">
            <div class="project-box">
                <img src="BRAND MARKETING.jpg" alt="Marketing">
                <div class="overlay">
                    <h3>Brand Marketing</h3>
                    <p>Photography and Layout</p>
                </div>
            </div>
        </a>
    </div>

</body>
</html>
