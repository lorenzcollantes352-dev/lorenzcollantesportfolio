<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received | Lorenz Collantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #00f2fe;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --bg-image: url('PHOTO.jpg'); 
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bgBlur {
            from { filter: blur(0px); }
            to { filter: blur(15px); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            background-color: #0a0a0c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        #bgOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at top left, rgba(30, 30, 47, 0.9), rgba(15, 12, 41, 0.92), rgba(0, 0, 0, 0.95)),
                var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: bgBlur 2s forwards;
        }

        .contact-container {
            width: 100%;
            max-width: 550px;
            padding: 80px 40px;
            text-align: center;
            animation: pageIn 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .success-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        h1 { 
            font-size: clamp(2rem, 5vw, 2.8rem); 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, var(--text-dim));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p.subtitle { 
            color: var(--text-dim); 
            font-weight: 200; 
            font-size: 1rem;
            margin-bottom: 40px; 
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .submit-btn {
            display: inline-block;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 50px;
            background: #fff;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .submit-btn:hover {
            transform: scale(1.05);
            background: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }

        .auto-redirect {
            margin-top: 30px;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .contact-container { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <div id="bgOverlay"></div>

    <div class="contact-container glass">
        <div class="success-icon">✓</div>
        <h1>Message Sent.</h1>
        <p class="subtitle">Thank you for reaching out. I've received your inquiry and will get back to you within 24 hours.</p>

        <a href="index.html" class="submit-btn">BACK TO ARCHIVE</a>

        <p class="auto-redirect" id="timer">Redirecting in 10 seconds...</p>
    </div>

    <script>
        // Automatic redirect logic
        let seconds = 10;
        const timerDisplay = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.innerText = `Redirecting in ${seconds} seconds...`;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "index.html";
            }
        }, 1000);
    </script>

</body>
</html>
