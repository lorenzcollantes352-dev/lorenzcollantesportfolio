<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lorenz Collantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #00f2fe;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --bg-image: url('PHOTO.jpg'); 
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bgBlur {
            from { filter: blur(0px); }
            to { filter: blur(10px); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            background-color: #0a0a0c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        #bgOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at top left, rgba(30, 30, 47, 0.9), rgba(15, 12, 41, 0.92), rgba(0, 0, 0, 0.95)),
                var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: filter 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            animation: bgBlur 2s forwards;
        }

        .focused-blur #bgOverlay {
            filter: blur(30px) brightness(0.7);
        }

        .contact-container {
            width: 100%;
            max-width: 550px;
            padding: 60px 40px;
            text-align: center;
            animation: pageIn 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .focused-blur .contact-container {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: clamp(2rem, 5vw, 2.8rem); 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--text-dim));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p.subtitle { 
            color: var(--text-dim); 
            font-weight: 200; 
            font-size: 0.95rem;
            margin-bottom: 40px; 
            letter-spacing: 0.5px;
        }

        form { display: flex; flex-direction: column; gap: 20px; text-align: left; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { 
            font-size: 0.7rem; 
            font-weight: 300; 
            letter-spacing: 2px; 
            color: var(--accent); 
            margin-left: 5px; 
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        textarea { resize: none; height: 120px; }

        .submit-btn {
            margin-top: 10px;
            padding: 18px;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        .submit-btn:hover {
            transform: scale(1.03);
            background: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }

        .back-home {
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-home:hover { color: #fff; text-shadow: 0 0 8px #fff; }

        @media (max-width: 480px) {
            .contact-container { padding: 40px 20px; }
        }
    </style>
</head>
<body id="bodyTag">

    <div id="bgOverlay"></div>

    <div class="contact-container glass">
        <h1>Get in touch.</h1>
        <p class="subtitle">Let's discuss your next digital strategy.</p>

        <form action="https://formspree.io/f/xykdaqyw" method="POST">
            <input type="hidden" name="_next" value="Thank-you-page.html">
            
            <div class="input-group">
                <label>NAME</label>
                <input type="text" name="name" placeholder="Lorenz Collantes" required onfocus="addFocus()" onblur="removeFocus()">
            </div>

            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" name="email" placeholder="email@example.com" required onfocus="addFocus()" onblur="removeFocus()">
            </div>

            <div class="input-group">
                <label>MESSAGE</label>
                <textarea name="message" placeholder="Briefly describe your project or inquiry..." required onfocus="addFocus()" onblur="removeFocus()"></textarea>
            </div>

            <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>

        <a href="index.html" class="back-home">RETURN TO ARCHIVE</a>
    </div>

    <script>
        const body = document.getElementById('bodyTag');

        function addFocus() {
            body.classList.add('focused-blur');
        }

        function removeFocus() {
            body.classList.remove('focused-blur');
        }
    </script>

</body>
</html>
